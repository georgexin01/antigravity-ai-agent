    <!-- Fullscreen on first interaction -->
    <script>
    let _fs=false;
    document.addEventListener('click',()=>{if(_fs)return;const el=document.documentElement;
    const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(fn)fn.call(el).then(()=>{_fs=true}).catch(()=>{})});
    document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement)_fs=false});
    </script>
