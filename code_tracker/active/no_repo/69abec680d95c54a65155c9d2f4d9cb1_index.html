<script>
(function(){
  if(window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone)return;
  var done=false;
  function isInteractive(el){
    while(el&&el!==document){
      var t=el.tagName;
      if(t==='BUTTON'||t==='INPUT'||t==='A'||t==='SELECT'||t==='TEXTAREA')return true;
      el=el.parentElement;
    }
    return false;
  }
  function goFS(e){
    if(done||isInteractive(e.target))return;
    var d=document.documentElement;
    var rfs=d.requestFullscreen||d.webkitRequestFullscreen||d.msRequestFullscreen;
    if(rfs){rfs.call(d).catch(function(){}).finally(function(){done=true;});}
    else{window.scrollTo(0,1);done=true;}
  }
  document.addEventListener('touchend',goFS,{passive:true});
  document.addEventListener('click',goFS);
  document.addEventListener('fullscreenchange',function(){if(!document.fullscreenElement)done=false;});
  document.addEventListener('webkitfullscreenchange',function(){if(!document.webkitFullscreenElement)done=false;});
})();
</script>
