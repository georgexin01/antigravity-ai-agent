  # Modular Component Registry (V27.3) — Engineering Authority
  
  This registry contains the "Cinematic Modules" mandated by V27.3 Master Rules. Every project must utilize at least 2 from this center.
  
  ## 🎞️ 1. Kinetic Text Module (`KineticTextModule`)
  
  Usage: For high-impact hero titles or section headers.
  Effect: Glitch, character scramble, or letter-by-letter weighted reveal.
  
  ### HTML Pattern:
  ```html
  <h1 class="kinetic-text" data-text="智能应用">智能应用</h1>
  ```
  
  ### CSS Physics:
  ```css
  .kinetic-text {
      font-family: var(--font-main);
      letter-spacing: -2px;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  ```
  
  ## 🖱️ 2. Image Trail Module (`ImageTrailModule`)
  
  Usage: For `About` or `Showcase` sections.
  Effect: A sequence of images that follow the mouse with spring-delayed velocity.
  
  ### Implementation Signature:
  *   Trigger: `mousemove` (Window-level or Container-level).
  *   Physics: Offset each frame by `(mouse_v * 0.1)`.
  
  ## 📦 3. Hover Accordion Module (`HoverAccordionModule`)
  
  Usage: For `Services` or `Process` sections. (Replacing standard card grids).
  Effect: Cards that expand horizontally on hover, compressing neighbors (Asymmetric weighting).
  
  ### Kinetic Rule:
  *   Width Shift: `40% -> 60%`.
  *   Neighbors: `20% -> 15%`.
  *   Spring: `stiffness: 100`.
  
  ## 📐 4. Asymmetric Matrix Module (`AsymMatrixModule`)
  
  Usage: Standard Section Layouts.
  Effect: 1/3 + 2/3 column layout with 10% vertical offset.
  
  ### CSS Signature:
  ```css
  .grid-asym-matrix {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: var(--space-xl);
  }
  .grid-asym-matrix > :nth-child(2) {
      transform: translateY(var(--space-l));
  }
  ```
  
  ---
  
  Protocol: Modular Component Registry — Cinematic V27.3 (2026-04-04)
  
