  # 🛡️ Vben Admin Recovery Handbook (Claude Mode)
  
  Purpose: Extreme environment stabilization for the Vben Admin + Supabase ecosystem.
  Scope: Local Docker (WSL2), dependency isolation, and Vite architecture.
  Updated: 2026-04-08 (Post-LAA-Restoration V7.5)
  
  ---
  
  ## ⛔ CRITICAL FAILURE 1: Global Dependency Poisoning
  Symptom: Vite compilation fails with strange Sass errors or "File not found" in `C:/Users/user/...`.
  Problem: Node.js finds a "ghost" `node_modules` in the user's home directory and uses it instead of the project-local one.
  MANDATORY FIX:
  1. Check for `C:\Users\user\node_modules`.
  2. If exists, RENAME it to `nodemodulesbackup`.
  3. Check for `C:\Users\user\package.json`.
  4. If exists, RENAME it to `package.json_backup`.
  
  ---
  
  ## 🎨 CRITICAL FAILURE 2: Sass 1.80+ Importer Mismatch
  Symptom: `[plugin:vite:css] [sass] An importer must have either canonicalize and load methods, or a findFileUrl method.`
  Problem: Sass 1.80+ removed the legacy API used by default in older Vite configs.
  MANDATORY FIX:
  - File: `internal/vite-config/src/config/application.ts`
  - Action: Uncomment/Enable `api: 'modern'`.
  - Project Pin: Ensure root `package.json` has `pnpm.overrides` for `"sass": "1.79.4"` and `"sass-embedded": "1.79.4"`.
  
  ---
  
  ## 🧟 CRITICAL FAILURE 3: Zombie Node Processes
  Symptom: "Port 5666 in use", stale UI changes, or persistent Sass errors even after a fix.
  Problem: Multiple orphaned `pnpm dev` or `vite` processes are running in the background.
  MANDATORY FIX:
  ```powershell
  # Kill all zombie node processes
  Get-Process node -ErrorAction SilentlyContinue | Stop-Process -Force
  # Clean Vite cache
  Remove-Item -Recurse -Force apps\web-antd\node_modules\.vite
  ```
  
  ---
  
  ## 🐳 CRITICAL FAILURE 4: Docker "Unhealthy" Database
  Symptom: Supabase containers start but show `(unhealthy)`, or `psql` connection fails.
  Problem: Insufficient disk space for WSL2 volumes or I/O hanging.
  MANDATORY FIX:
  1. Check local hard disk space (need 10GB+ free).
  2. If unhealthy persists: `supabase stop` → `Clean Docker Desktop (Purge data)` → `supabase start`.
  3. Verify Port: Local Supabase uses `54321` (API) and `54322` (Postgres).
  
  ---
  
  ## 🔗 CRITICAL FAILURE 5: Connection Confusion (VPS vs Local)
  Symptom: Login works but "No Data" appears, or JWT errors.
  Problem: `.env` is pointing to `localhost:8000` (SSH Tunnel) instead of `localhost:54321` (Local Docker).
  MANDATORY CHECK:
  - Local Dev: URL=`http://localhost:54321`, ID=`local-supabase`.
  - VPS Dev: URL=`http://localhost:8000`, ID=`{Remote-UUID}`.
  
  ---
  
  ## 🚀 The "Antigravity" Recovery Flow
  If any "bugs" are reported in `dev:local`, the AI MUST run this sequence:
  1. `Stop-Process node`
  2. Rename global `C:\Users\user\node_modules`
  3. Delete `.vite` cache
  4. Enable `api: 'modern'` in Vite config
  5. `pnpm dev:local`
  
