  # Pattern 02: Postgres to TS Mapping Guide
  
  Logic mapping:
  - text/varchar -> string
  - uuid -> string (v4)
  - integer/bigint -> number
  - numeric/decimal -> number
  - boolean -> boolean
  - jsonb -> any / Record<string, any>
  - timestamptz -> string (ISO)
  
  Rule: Use interfaces for DB, View, and Form objects.
