        "Don\u0027t":  "Let text span full viewport width",
        "Code Example Good":  "max-w-prose or max-w-3xl",
        "Code Example Bad":  "Full width paragraphs",
        "Severity":  "Medium"
    },
    {
        "No":  "22",
