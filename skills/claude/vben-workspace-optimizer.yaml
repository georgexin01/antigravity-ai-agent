l: |-
  # Vben Workspace Token Optimizer V1.0
  
  PURPOSE: Automatically detect Vben Admin + Supabase projects and generate `.geminiignore` / `.claudeignore` files to drastically reduce AI token usage and speed up reading by ignoring framework internals, binary assets, and build outputs.
  TARGET: AI Gemini 3.1 Pro (and legacy Claude Code support).
  
  ## Detection Logic
  
  When an AI agent starts work in a project, check if ALL of the following are true:
  1. `package.json` contains any `@vben/` dependency OR the `apps/` + `packages/` monorepo structure exists.
  2. `supabase/` directory exists OR `package.json` contains `@supabase/supabase-js`.
  
  If BOTH conditions match, this is a Vben Admin Supabase project.
  
  ## Optimization Protocol
  
  ### 1. Auto-Create Ignore Files
  If `.geminiignore` and `.claudeignore` do NOT exist in the project root, the AI must create them IMMEDIATELY using the standard template below. 
  *(Note: Gemini 3.1 Pro respects `.gitignore` natively, but `.geminiignore` / `.claudeignore` provide an AI-specific override layer preventing the AI from reading large framework files that shouldn't be touched).*
  
  ### 2. Auto-Update Ignore Files
  If the files ALREADY exist, scan them and append any missing entries from the standard template.
  - NEVER remove user-added lines.
  - Add new entries under a `# --- Auto-updated by Gemini (Date) ---` comment block.
  
  ## Standard Ignore Template
  
  ```text
  # ============================================
  # .geminiignore / .claudeignore
  # Vben Admin + Supabase Project
  # Auto-generated to reduce token usage & optimize Gemini 3.1 Pro context
  # ============================================
  
  # --------------------------------------------------
  # NODE MODULES (largest folder, never needs AI reading)
  # --------------------------------------------------
  node_modules/
  **/node_modules/
  
  # --------------------------------------------------
  # BUILD OUTPUT (generated files, not source code)
  # --------------------------------------------------
  dist/
  **/dist/
  .output/
  .nuxt/
  
  # --------------------------------------------------
  # VBEN ADMIN — MONOREPO INTERNALS
  # These are framework packages you don't edit
  # --------------------------------------------------
  packages/@core/
  packages/effects/
  packages/icons/
  packages/locales/
  packages/stores/
  packages/types/
  packages/utils/
  internal/
  scripts/
  
  # --------------------------------------------------
  # VBEN ADMIN — GENERATED / CACHED
  # --------------------------------------------------
  .vite/
  .turbo/
  **/.turbo/
  *.tsbuildinfo
  
  # --------------------------------------------------
  # LOCK FILES (huge, not useful for AI)
  # --------------------------------------------------
  pnpm-lock.yaml
  package-lock.json
  yarn.lock
  
  # --------------------------------------------------
  # SUPABASE — LOCAL DEV FILES
  # Auto-generated, large, change frequently
  # --------------------------------------------------
  supabase/.branches/
  supabase/.temp/
  supabase/.gitignore
  
  # --------------------------------------------------
  # SUPABASE — GENERATED TYPES (regenerated via CLI)
  # --------------------------------------------------
  **/database.types.ts
  **/supabase-types.ts
  
  # --------------------------------------------------
  # SUPABASE — MIGRATION HISTORY (read only when needed)
  # --------------------------------------------------
  supabase/migrations/
  
  # --------------------------------------------------
  # ENVIRONMENT / SECRETS (security + not useful)
  # --------------------------------------------------
  .env
  .env.*
  !.env.example
  
  # --------------------------------------------------
  # GIT DATA
  # --------------------------------------------------
  .git/
  
  # --------------------------------------------------
  # IDE / EDITOR
  # --------------------------------------------------
  .vscode/
  .idea/
  *.swp
  *.swo
  
  # --------------------------------------------------
  # OS FILES
  # --------------------------------------------------
  .DS_Store
  Thumbs.db
  desktop.ini
  
  # --------------------------------------------------
  # TEST COVERAGE & REPORTS (generated)
  # --------------------------------------------------
  coverage/
  tests/snapshots/
  *.lcov
  
  # --------------------------------------------------
  # DOCKER (infrastructure, not app code)
  # --------------------------------------------------
  docker-compose*.yml
  Dockerfile*
  .dockerignore
  
  # --------------------------------------------------
  # CI/CD (rarely needs AI editing)
  # --------------------------------------------------
  .github/
  .gitlab-ci.yml
  
  # --------------------------------------------------
  # DOCUMENTATION (reduces noise)
  # --------------------------------------------------
  docs/
  *.yaml
  !README.yaml
  !CLAUDE.yaml
  !TROUBLESHOOTING.yaml
  
  # --------------------------------------------------
  # ASSETS — BINARY FILES (AI can't read these)
  # --------------------------------------------------
  *.png
  *.jpg
  *.jpeg
  *.gif
  *.svg
  *.ico
  *.woff
  *.woff2
  *.ttf
  *.eot
  *.mp4
  *.webm
  *.pdf
  ```
  
